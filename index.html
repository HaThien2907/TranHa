<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Day ❤️ Trần Hà </title>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
        }

        /* ===== STAGE 1 ===== */
        #stage1 {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: radial-gradient(ellipse at 50% 80%, #f8bbd0 0%, #fce4ec 60%, #fff5f7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, transform 1s ease;
            overflow: hidden;
        }

        /* Heart bokeh shadows on Stage 1 */
        #stage1::before {
            content: '💗';
            position: absolute;
            font-size: 120px;
            opacity: 0.06;
            top: 10%;
            left: 10%;
            animation: heartFloat1 8s ease-in-out infinite;
            z-index: 1;
        }

        #stage1::after {
            content: '💕';
            position: absolute;
            font-size: 100px;
            opacity: 0.05;
            bottom: 15%;
            right: 8%;
            animation: heartFloat2 10s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes heartFloat1 {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-15px) scale(1.05);
            }
        }

        @keyframes heartFloat2 {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        #stage1.hide {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .petal {
            position: absolute;
            pointer-events: none;
            animation: petalFall linear infinite;
            background: linear-gradient(135deg, #f48fb1, #e91e63);
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            opacity: 0.35;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(-15vh) rotate(0) translateX(0);
                opacity: 0;
            }

            20% {
                opacity: 0.35;
            }

            90% {
                opacity: 0.35;
            }

            100% {
                transform: translateY(110vh) rotate(720deg) translateX(var(--dx));
                opacity: 0;
            }
        }

        .landing-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            padding: 2.5rem;
            animation: landFloat 5s ease-in-out infinite;
        }

        .landing-aura {
            position: absolute;
            inset: -40px;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: auraPulse 4s ease-in-out infinite alternate;
        }

        @keyframes auraPulse {
            from {
                transform: scale(0.95);
                opacity: 0.6;
            }

            to {
                transform: scale(1.1);
                opacity: 0.9;
            }
        }

        .landing-subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: #ad1457;
            margin-bottom: 20px;
            text-align: center;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        .landing-title {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: #c2185b;
            margin: 10px 0 25px;
            text-align: center;
            text-shadow: 0 4px 10px rgba(194, 24, 91, 0.1);
        }

        @keyframes landFloat {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-15px)
            }
        }

        .rose-frame {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 10px solid #fff;
            box-shadow: 0 25px 70px rgba(214, 51, 132, 0.25);
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .rose-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoomPulse 15s infinite alternate;
        }

        @keyframes zoomPulse {
            from {
                transform: scale(1)
            }

            to {
                transform: scale(1.15)
            }
        }

        .big-83 {
            font-family: 'Playfair Display', serif;
            font-size: 140px;
            font-weight: 700;
            background: linear-gradient(to bottom, #d63384 40%, #c2185b 90%);
            -webkit-background-clip: text;
            background-clip: text;
            /* Standard property for compatibility */
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-top: -40px;
            z-index: 10;
            text-shadow: none;
            filter: drop-shadow(0 15px 30px rgba(214, 51, 132, 0.35));
        }

        .btn-start {
            margin-top: 20px;
            padding: 18px 80px;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #d63384, #f06292);
            color: #fff;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(214, 51, 132, 0.4);
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-start::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: rotate(45deg);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .btn-start:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 18px 60px rgba(214, 51, 132, 0.6);
        }

        /* ===== STAGE 2 ===== */
        #stage2 {
            position: fixed;
            inset: 0;
            z-index: 90;
            background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 80%, #f48fb1 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #stage2.active {
            display: flex;
        }

        /* Decorations */
        .s2-decor {
            position: absolute;
            pointer-events: none;
        }

        .s2-heart {
            font-size: 40px;
            animation: heartBob 3s ease-in-out infinite;
        }

        @keyframes heartBob {

            0%,
            100% {
                transform: translateY(0) scale(1)
            }

            50% {
                transform: translateY(-12px) scale(1.1)
            }
        }

        .sparkle-star {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.5)
            }

            50% {
                opacity: 1;
                transform: scale(1.2)
            }
        }

        .cloud-svg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.6) 0%, transparent 100%);
        }

        .bubble {
            position: absolute;
            background: linear-gradient(135deg, #f48fb1, #f06292);
            pointer-events: none;
            animation: rise linear infinite;
            opacity: 0.5;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        @keyframes rise {
            from {
                transform: translateY(110vh) scale(0.8);
                opacity: 0
            }

            10% {
                opacity: 0.7
            }

            90% {
                opacity: 0.7
            }

            to {
                transform: translateY(-20vh) scale(1.3);
                opacity: 0
            }
        }

        .main-title {
            position: absolute;
            top: 40px;
            text-align: center;
            width: 100%;
            z-index: 10;
            font-family: 'Great Vibes', cursive;
            font-size: 60px;
            color: #ad1457;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
        }

        /* BOOK */
        .book-wrapper {
            perspective: 2500px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-wrapper.open {
            transform: translateX(210px);
        }

        .book-wrapper.finished {
            transform: translateX(380px);
        }

        .book {
            width: 380px;
            height: 520px;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #fffaf5;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #f5f0eb;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .page-face.front {
            border-radius: 4px 16px 16px 4px;
            background: #fffaf5;
            box-shadow: inset 2px 0 6px rgba(0, 0, 0, 0.04), 6px 6px 20px rgba(0, 0, 0, 0.06);
        }

        .page-face.back {
            transform: rotateY(180deg);
            border-radius: 16px 4px 4px 16px;
            background: #fffaf5;
            box-shadow: inset -2px 0 6px rgba(0, 0, 0, 0.04), -6px 6px 20px rgba(0, 0, 0, 0.06);
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page-img {
            width: 100%;
            height: 72%;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 18px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .page-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .page-content p {
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            color: #5d4037;
            line-height: 1.5;
            font-weight: 500;
        }

        .page-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #ad1457;
            margin-bottom: 12px;
        }

        .nav-hint {
            position: absolute;
            bottom: 30px;
            color: #ad1457;
            font-size: 13px;
            letter-spacing: 2px;
            z-index: 30;
            opacity: 0.45;
            font-weight: 600;
        }

        /* Click zones for the entire page area */
        .flip-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 50;
            cursor: pointer;
        }

        .flip-left {
            left: 0;
        }

        .flip-right {
            right: 0;
        }

        /* ===== STAGE 3 ===== */
        #stage3 {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 110;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #stage3.active {
            display: flex;
        }

        .load-t {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            color: #f06292;
            margin-bottom: 35px;
            text-shadow: 0 0 25px rgba(240, 98, 146, 0.6);
        }

        .prog-box {
            width: 320px;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
        }

        .prog-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #d63384, #f06292);
            box-shadow: 0 0 15px #f06292;
            transition: width 0.05s;
        }

        /* ===== STAGE 4 ===== */
        #stage4 {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: none;
            z-index: 80;
            overflow: hidden;
        }

        #stage4.active {
            display: block;
        }

        #canvas3d {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .floating-msgs {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .msg {
            position: absolute;
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: #f8bbd0;
            text-shadow: 0 0 12px rgba(248, 187, 208, 0.4);
            animation: msgUp linear var(--dur) forwards;
            font-weight: 700;
            white-space: nowrap;
        }

        @keyframes msgUp {
            0% {
                transform: translateY(100vh);
                opacity: 0
            }

            15% {
                opacity: 1
            }

            85% {
                opacity: 1
            }

            100% {
                transform: translateY(-15vh);
                opacity: 0
            }
        }

        /* ===== MOBILE (tablets & phones) ===== */
        @media (max-width:768px) {
            .book-wrapper.open {
                transform: translateX(130px);
            }

            .book-wrapper.finished {
                transform: translateX(260px);
            }

            .book {
                width: 260px;
                height: 380px;
            }

            .big-83 {
                font-size: 70px;
                margin-top: -15px;
            }

            .rose-frame {
                width: 180px;
                height: 180px;
            }

            .main-title {
                font-size: 28px;
                position: relative;
                top: auto;
                padding: 15px 10px 5px;
                margin-bottom: 10px;
            }

            .page-face {
                padding: 15px;
            }

            .page-content p {
                font-size: 16px;
            }

            .page-content h3 {
                font-size: 22px;
            }

            .page-img {
                height: 65%;
                margin-bottom: 12px;
            }

            .btn-start {
                padding: 14px 45px;
                font-size: 17px;
            }

            .load-t {
                font-size: 36px;
            }

            .nav-hint {
                bottom: 15px;
                font-size: 11px;
            }

            .s2-heart {
                font-size: 28px;
            }

            .landing-box {
                animation: none !important;
            }
        }

        /* ===== MOBILE (small phones) ===== */
        @media (max-width:430px) {
            .book-wrapper.open {
                transform: translateX(100px);
                /* 1/2 of 200px */
            }

            .book-wrapper.finished {
                transform: translateX(200px);
                /* full 200px */
            }

            .book {
                width: 200px;
                /* 400px spread fits nicely in 430px screen */
                height: 330px;
            }

            .big-83 {
                font-size: 55px;
                margin-top: -10px;
            }

            .rose-frame {
                width: 130px;
                height: 130px;
                border-width: 5px;
            }

            .landing-subtitle {
                font-size: 16px;
                margin-bottom: 12px;
            }

            .landing-title {
                font-size: 22px;
                margin-bottom: 15px;
            }

            .main-title {
                font-size: 26px;
                top: 10px;
            }

            .page-face {
                padding: 12px;
            }

            .page-content p {
                font-size: 14px;
            }

            .page-content h3 {
                font-size: 18px;
            }

            .page-img {
                height: 60%;
                border-radius: 8px;
                margin-bottom: 8px;
            }

            .btn-start {
                padding: 12px 35px;
                font-size: 15px;
                margin-top: 30px;
            }

            .load-t {
                font-size: 28px;
            }

            .prog-box {
                width: 250px;
            }

            .s2-heart {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
<!-- Nhạc nền -->
<audio id="bgMusic" autoplay loop>
    <source src="music/love.mp3" type="audio/mpeg">
</audio>

    <!-- STAGE 1 -->
    <div id="stage1">
        <div id="petalBox"></div>
        <div class="landing-box">
            <div class="landing-aura"></div>
            <p class="landing-subtitle">Gửi đến người phụ nữ tuyệt vời nhất</p>
            <div class="rose-frame"><img src="images/anh1.png" alt="Flowers"></div>
            <div class="big-83">8.3</div>
            <p class="landing-title">Chúc Mừng Ngày Phụ Nữ</p>
            <button class="btn-start" onclick="startApp()">Sẵn sàng ❤️</button>
        </div>
    </div>

    <!-- STAGE 2 -->
    <div id="stage2">
        <div class="main-title">Happy Women's Day Trần Hà ❤️</div>

        <!-- Hearts ở những vị trí đẹp -->
        <div class="s2-decor s2-heart" style="top:20px;left:30px">💗</div>
        <div class="s2-decor s2-heart" style="top:20px;right:30px;animation-delay:0.5s">💗</div>
        <div class="s2-decor s2-heart" style="bottom:80px;left:50px;animation-delay:1s">💕</div>
        <div class="s2-decor s2-heart" style="bottom:80px;right:50px;animation-delay:1.5s">💕</div>

        <!-- Sparkle Stars -->
        <div id="sparkleBox"></div>
        <!-- Bubbles -->
        <div id="bubbleBox"></div>
        <!-- Cloud base -->
        <div class="cloud-svg"></div>

        <!-- Click zones -->
        <div class="flip-zone flip-left" id="flipLeft"></div>
        <div class="flip-zone flip-right" id="flipRight"></div>

        <div class="book-wrapper" id="bookWrapper">
            <div class="book" id="book"></div>
        </div>
        <div class="nav-hint">↰ NHẤN TRÁI · NHẤN PHẢI ↱</div>
    </div>

    <!-- STAGE 3 -->
    <div id="stage3">
        <div class="load-t">Dành tặng Trần Hà ...</div>
        <div class="prog-box">
            <div class="prog-bar" id="progBar"></div>
        </div>
    </div>

    <div id="stage4">
        <div id="canvas3d"></div>
        <div class="floating-msgs" id="msgBox"></div>
    </div>

    <script>
        // ==================== CẤU HÌNH – THÊM ẢNH Ở ĐÂY ====================
        const GALLERY = [
            { img: "images/anh1.png", text: "Chúc chị ngày 8/3 luôn vui vẻ, xinh tươi như hoa, và luôn rạng rỡ.." },
            { img: "images/anh2.png", text: "Mong rằng chị luôn xinh đẹp rạng ngời, tài sắc vẹn toàn, có một ngày 8/3 nhiều hoa, nhiều quà bên gia đình và người thân.." },
            { img: "images/anh3.png", text: "Happy Women's Day to all the amazing women in the world! Wish your Women's Day be filled with joy and happiness.." },
            { img: "images/anh4.png", text: "Đừng chỉ xinh đẹp như một đóa hoa, hãy rực rỡ và tự do như một cánh chim. Happy Women's Day!." },
            { img: "images/anh5.png", text: "Phụ nữ hiện đại: Tự tin - Độc lập - Hạnh phúc. Chúc mừng ngày 8/3!." },
            { img: "images/anh6.png", text: "Chúc chị luôn xinh đẹp như hoa, giỏi giang trong công việc và viên mãn trong cuộc sống." },
            { img: "images/anh7.png", text: "Just wanted to thank you from the bottom of my heart for all things you do! Happy Women’s Day!." },
            { img: "images/anh8.png", text: "Empowered women empower women. Happy Women's Day!." },
            { img: "images/anh9.png", text: "May you continue to thrive and reach new heights. Happy Women’s Day!." },
            { img: "images/anh10.png", text: "Wishing you success and happiness on your special day. Happy March 8th!." },
            // Thêm ảnh: { img:"images/ten_anh.png", text:"Lời nhắn." },
        ];
        // Tất cả ảnh dùng cho vòng tròn ảnh 3D
        const ALL_IMAGES = GALLERY.map(g => g.img);
       const MESSAGES = ["Trần Hà ❤️", "Beautiful", "Wonderful", "Intelligent", "Happy 8/3 🌹", "Talented"];
        // =====================================================================

        let curPage = 0;
        const allPages = [];

        /* ── STAGE 1: Petals ── */
        function initPetals() {
            const box = document.getElementById('petalBox');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const sz = 18 + Math.random() * 12; // 18-30px square
                Object.assign(p.style, {
                    width: sz + 'px', height: sz + 'px', // Square so clip-path heart works
                    left: Math.random() * 100 + 'vw',
                    animationDuration: (8 + Math.random() * 8) + 's',
                    animationDelay: (Math.random() * 12) + 's', // Spread out over 12s
                });
                p.style.setProperty('--dx', (Math.random() * 80 - 40) + 'px');
                box.appendChild(p);
            }
        }

        /* ── STAGE 2: Sparkles & Bubbles ── */
        function initSparkles() {
            const box = document.getElementById('sparkleBox');
            for (let i = 0; i < 25; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle-star';
                Object.assign(s.style, {
                    left: Math.random() * 100 + '%', top: Math.random() * 100 + '%',
                    animationDelay: Math.random() * 3 + 's',
                    width: (10 + Math.random() * 15) + 'px', height: (10 + Math.random() * 15) + 'px',
                });
                box.appendChild(s);
            }
        }
        function initBubbles() {
            const box = document.getElementById('bubbleBox');
            for (let i = 0; i < 18; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const sz = 25 + Math.random() * 50;
                Object.assign(b.style, {
                    width: sz + 'px', height: sz + 'px',
                    left: Math.random() * 100 + 'vw',
                    animationDuration: (10 + Math.random() * 10) + 's',
                    animationDelay: Math.random() * 8 + 's',
                });
                box.appendChild(b);
            }
        }

        /* ── BUILD BOOK ── */
        // Content slots: [Cover, item0, item1, item2, ... itemN-1, EndPage]
        // Each physical page uses 2 slots: front + back
        // When you flip page 0, you see: page0.back (slot 1) + page1.front (slot 2)
        // So every SPREAD shows unique content
        function buildBook() {
            const book = document.getElementById('book');

            // Build content slots array
            const slots = [];
            // Slot 0: Cover
            slots.push({ type: 'cover' });
            // Slots 1..N: Gallery items
            GALLERY.forEach(g => slots.push({ type: 'gallery', img: g.img, text: g.text }));
            // Last slot: End page
            slots.push({ type: 'end' });

            // If odd number of slots, add blank
            if (slots.length % 2 !== 0) slots.push({ type: 'blank' });

            const numPages = slots.length / 2;

            for (let p = 0; p < numPages; p++) {
                const frontSlot = slots[p * 2];
                const backSlot = slots[p * 2 + 1];

                const page = document.createElement('div');
                page.className = 'page';
                page.style.zIndex = numPages - p;

                // FRONT face
                const front = document.createElement('div');
                front.className = 'page-face front';
                renderSlot(front, frontSlot);

                // BACK face
                const back = document.createElement('div');
                back.className = 'page-face back';
                renderSlot(back, backSlot);

                page.appendChild(front);
                page.appendChild(back);
                book.appendChild(page);
                allPages.push(page);
            }

            // Click zones
            document.getElementById('flipRight').onclick = () => flipNext();
            document.getElementById('flipLeft').onclick = () => flipPrev();
        }

        function renderSlot(face, slot) {
            if (slot.type === 'cover') {
                face.style.background = 'linear-gradient(135deg,#ad1457,#d63384)';
                face.innerHTML = `<div class="page-content"><h3 style="color:#fff;font-size:38px"> Trần Hà </h3><p style="color:rgba(255,255,255,0.85);font-size:20px">The book by Trần Hà</p></div>`;
            } else if (slot.type === 'gallery') {
                face.innerHTML = `<img src="${slot.img}" class="page-img"><div class="page-content"><p>"${slot.text}"</p></div>`;
            } else if (slot.type === 'end') {
                face.innerHTML = `<div class="page-content"><h3>Chúc chị ngày 8/3 thật hạnh phúc! ❤️</h3><p>"Happy Women's Day, Trần Hà "</p></div>`;
            } else {
                face.innerHTML = `<div class="page-content"><p></p></div>`;
            }
        }

        function flipNext() {
            if (curPage < allPages.length) {
                const flipping = allPages[curPage];
                // Boost z-index of flipping page during animation
                flipping.style.zIndex = allPages.length + 1;
                flipping.classList.add('flipped');
                curPage++;
                // After animation completes, fix all z-indexes
                setTimeout(() => reorderZIndexes(), 1500);
                updateBookShift();
                if (curPage === allPages.length) setTimeout(goLoading, 2500);
            }
        }
        function flipPrev() {
            if (curPage > 0) {
                curPage--;
                const flipping = allPages[curPage];
                // Boost z-index of flipping page during animation
                flipping.style.zIndex = allPages.length + 1;
                flipping.classList.remove('flipped');
                // After animation completes, fix all z-indexes
                setTimeout(() => reorderZIndexes(), 1500);
                updateBookShift();
            }
        }

        function reorderZIndexes() {
            allPages.forEach((page, i) => {
                if (i < curPage) {
                    // Flipped pages (left stack): last flipped on top
                    page.style.zIndex = i + 1;
                } else {
                    // Unflipped pages (right stack): first unflipped on top
                    page.style.zIndex = allPages.length - i;
                }
            });
        }
        function updateBookShift() {
            const w = document.getElementById('bookWrapper');
            w.classList.remove('open', 'finished');
            if (curPage > 0 && curPage < allPages.length) {
                w.classList.add('open');
            } else if (curPage === allPages.length) {
                // All pages flipped: shift right by book width to center the back of last page
                w.classList.add('finished');
            }
        }

        /* ── NAV ── */
        function startApp() {
            document.getElementById('stage1').classList.add('hide');
            setTimeout(() => {
                document.getElementById('stage1').style.display = 'none';
                document.getElementById('stage2').classList.add('active');
                initSparkles(); initBubbles();
            }, 1000);
        }

        function goLoading() {
            const s2 = document.getElementById('stage2');
            s2.style.opacity = '0';
            setTimeout(() => {
                s2.style.display = 'none';
                document.getElementById('stage3').classList.add('active');
                let p = 0;
                const iv = setInterval(() => {
                    p += 1;
                    document.getElementById('progBar').style.width = p + '%';
                    if (p >= 100) { clearInterval(iv); setTimeout(go3D, 400); }
                }, 25);
            }, 1000);
        }

        function go3D() {
            document.getElementById('stage3').style.display = 'none';
            document.getElementById('stage4').classList.add('active');
            initThreeScene();
            spawnLoop();
        }

        /* ── STAGE 4: THREE.JS ── */
        function initThreeScene() {
            const container = document.getElementById('canvas3d');
            const W = window.innerWidth, H = window.innerHeight;
            const isMobile = W < 768;

            // ── SHARED SCENE & CAMERA ──
            const scene = new THREE.Scene();
            const cssScene = new THREE.Scene(); // Separate scene for CSS3D objects
            const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
            camera.position.set(0, isMobile ? 15 : 10, isMobile ? 130 : 100);

            // ── WEBGL RENDERER (behind - particles with transparent bg) ──
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(W, H);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.pointerEvents = 'none';
            container.appendChild(renderer.domElement);

            // ── CSS3D RENDERER (on top - renders DOM img elements in front) ──
            const cssRenderer = new THREE.CSS3DRenderer();
            cssRenderer.setSize(W, H);
            cssRenderer.domElement.style.position = 'absolute';
            cssRenderer.domElement.style.top = '0';
            container.appendChild(cssRenderer.domElement);

            // ── CONTROLS (attached to CSS3D div on top) ──
            const controls = new THREE.OrbitControls(camera, cssRenderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // ── PARTICLE HEART ──
            const heartPts = [];
            for (let i = 0; i < 15000; i++) {
                const t = Math.random() * Math.PI * 2;
                const fill = Math.pow(Math.random(), 0.5);
                const x = 16 * Math.pow(Math.sin(t), 3) * fill;
                const y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * fill;
                const z = (Math.random() - 0.5) * 12 * (1 - fill * 0.5);
                heartPts.push(new THREE.Vector3(x, y, z));
            }
            const heartGeo = new THREE.BufferGeometry().setFromPoints(heartPts);
            const heartMat = new THREE.PointsMaterial({
                color: 0xff4081, size: 0.45, transparent: true, opacity: 0.85,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            const heart = new THREE.Points(heartGeo, heartMat);
            const heartScale = isMobile ? 1.2 : 1.8;
            heart.scale.set(heartScale, heartScale, heartScale);
            heart.position.y = isMobile ? 12 : 8;
            scene.add(heart);

            // ── PHOTO RING (CSS3DRenderer - real DOM images in 3D!) ──
            const photoRing = new THREE.Group();
            const ringRadius = isMobile ? 22 : 35;
            const imgSize = isMobile ? 90 : 140;
            const cssScale = isMobile ? 0.12 : 0.1;

            ALL_IMAGES.forEach((imgPath, i) => {
                const angle = (Math.PI * 2 / ALL_IMAGES.length) * i;
                const x = Math.cos(angle) * ringRadius;
                const z = Math.sin(angle) * ringRadius;

                // Create real DOM element with img
                const div = document.createElement('div');
                div.style.width = imgSize + 'px';
                div.style.height = (imgSize * 1.3) + 'px';
                div.style.background = '#fff';
                div.style.borderRadius = '8px';
                div.style.padding = '5px';
                div.style.boxSizing = 'border-box';
                div.style.boxShadow = '0 4px 20px rgba(0,0,0,0.5), 0 0 15px rgba(233,30,99,0.3)';
                div.innerHTML = `<img src="${imgPath}" style="width:100%;height:100%;object-fit:cover;border-radius:5px;">`;

                // Wrap in CSS3DObject and scale down to match world units
                const obj = new THREE.CSS3DObject(div);
                obj.position.set(x, 0, z);
                obj.lookAt(0, 0, 0); // Face center
                obj.scale.set(cssScale, cssScale, cssScale); // Scale DOM element to fit 3D world
                photoRing.add(obj);
            });

            photoRing.position.y = heart.position.y; // Same height as heart center
            cssScene.add(photoRing);

            // ── STARS (4000) ──
            const starPts = [];
            for (let i = 0; i < 4000; i++) {
                starPts.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 250, (Math.random() - 0.5) * 250, (Math.random() - 0.5) * 250
                ));
            }
            const starGeo = new THREE.BufferGeometry().setFromPoints(starPts);
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0.75 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ── FIREWORK SYSTEM (Rocket → Heart + Sparkle Explosion) ──
            const fireworks = [];

            function launchFirework() {
                const startX = (Math.random() - 0.5) * 150;
                const startZ = (Math.random() - 0.5) * 80;
                const targetY = 5 + Math.random() * 35;

                // Rocket trail
                const rocketGeo = new THREE.BufferGeometry();
                const trailCount = 40;
                const rocketPos = new Float32Array(trailCount * 3);
                for (let i = 0; i < trailCount; i++) {
                    rocketPos[i * 3] = startX;
                    rocketPos[i * 3 + 1] = -40;
                    rocketPos[i * 3 + 2] = startZ;
                }
                rocketGeo.setAttribute('position', new THREE.BufferAttribute(rocketPos, 3));
                const rocketColors = [0xffffff, 0xffddee, 0xffc0cb, 0xffffaa];
                const rocketMat = new THREE.PointsMaterial({
                    color: rocketColors[Math.floor(Math.random() * rocketColors.length)],
                    size: 1.5, transparent: true, opacity: 1,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
                const rocket = new THREE.Points(rocketGeo, rocketMat);
                scene.add(rocket);

                fireworks.push({
                    phase: 'rocket', rocket, rocketGeo, rocketMat,
                    x: startX, z: startZ,
                    currentY: -40, targetY,
                    speed: 0.8 + Math.random() * 0.5,
                });
            }

            function explodeHeart(x, y, z) {
                // ── Main heart burst ──
                const count = 800;
                const positions = new Float32Array(count * 3);
                const velocities = [];
                for (let i = 0; i < count; i++) {
                    positions[i * 3] = 0;
                    positions[i * 3 + 1] = 0;
                    positions[i * 3 + 2] = 0;
                    const t = (i / count) * Math.PI * 2;
                    const fill = Math.pow(Math.random(), 0.5);
                    const speedMul = 0.8 + Math.random() * 0.5; // Varied speed
                    const hx = 16 * Math.pow(Math.sin(t), 3) * fill * 0.25;
                    const hy = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * fill * 0.25;
                    velocities.push({ x: hx * 0.07 * speedMul, y: hy * 0.07 * speedMul, z: 0 });
                }
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const colors = [
                    0xff6b9d, 0xc084fc, 0xfda4af, 0xfbbf24,
                    0xff7eb3, 0xe879f9, 0xfb7185, 0x93c5fd,
                ];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const mat = new THREE.PointsMaterial({
                    color, size: 0.9, transparent: true, opacity: 1,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
                const pts = new THREE.Points(geo, mat);
                pts.position.set(x, y, z);
                scene.add(pts);
                fireworks.push({ phase: 'burst', pts, geo, mat, velocities, life: 0, maxLife: 160 });

                // ── Sparkle ring (circular spray around the heart) ──
                const sparkCount = 200;
                const sparkPos = new Float32Array(sparkCount * 3);
                const sparkVel = [];
                for (let i = 0; i < sparkCount; i++) {
                    sparkPos[i * 3] = 0;
                    sparkPos[i * 3 + 1] = 0;
                    sparkPos[i * 3 + 2] = 0;
                    const a = Math.random() * Math.PI * 2;
                    const spd = 0.15 + Math.random() * 0.25;
                    sparkVel.push({
                        x: Math.cos(a) * spd,
                        y: Math.sin(a) * spd + 0.05,
                        z: (Math.random() - 0.5) * 0.1
                    });
                }
                const sparkGeo = new THREE.BufferGeometry();
                sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
                const sparkMat = new THREE.PointsMaterial({
                    color: 0xffffff, size: 0.5, transparent: true, opacity: 1,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
                const sparkPts = new THREE.Points(sparkGeo, sparkMat);
                sparkPts.position.set(x, y, z);
                scene.add(sparkPts);
                fireworks.push({ phase: 'burst', pts: sparkPts, geo: sparkGeo, mat: sparkMat, velocities: sparkVel, life: 0, maxLife: 100 });
            }

            function updateFireworks() {
                for (let fi = fireworks.length - 1; fi >= 0; fi--) {
                    const fw = fireworks[fi];

                    if (fw.phase === 'rocket') {
                        fw.currentY += fw.speed;
                        const pos = fw.rocketGeo.attributes.position.array;
                        for (let i = pos.length / 3 - 1; i > 0; i--) {
                            pos[i * 3] = pos[(i - 1) * 3];
                            pos[i * 3 + 1] = pos[(i - 1) * 3 + 1];
                            pos[i * 3 + 2] = pos[(i - 1) * 3 + 2];
                        }
                        pos[0] = fw.x + (Math.random() - 0.5) * 0.3;
                        pos[1] = fw.currentY;
                        pos[2] = fw.z + (Math.random() - 0.5) * 0.3;
                        fw.rocketGeo.attributes.position.needsUpdate = true;
                        fw.rocketMat.opacity = Math.max(0, 1 - (fw.currentY - (-40)) / (fw.targetY + 40) * 0.3);

                        if (fw.currentY >= fw.targetY) {
                            scene.remove(fw.rocket);
                            fw.rocketGeo.dispose(); fw.rocketMat.dispose();
                            explodeHeart(fw.x, fw.currentY, fw.z);
                            fireworks.splice(fi, 1);
                        }
                    } else if (fw.phase === 'burst') {
                        fw.life++;
                        const pos = fw.geo.attributes.position.array;
                        for (let i = 0; i < fw.velocities.length; i++) {
                            pos[i * 3] += fw.velocities[i].x;
                            pos[i * 3 + 1] += fw.velocities[i].y - 0.005; // Gravity pull
                            pos[i * 3 + 2] += fw.velocities[i].z;
                            // Slow down over time (drag)
                            fw.velocities[i].x *= 0.995;
                            fw.velocities[i].y *= 0.995;
                        }
                        fw.geo.attributes.position.needsUpdate = true;
                        // Smooth fade with slight flicker
                        const progress = fw.life / fw.maxLife;
                        fw.mat.opacity = Math.max(0, (1 - progress) * (1 + Math.sin(fw.life * 0.3) * 0.1));
                        if (fw.life >= fw.maxLife) {
                            scene.remove(fw.pts);
                            fw.geo.dispose(); fw.mat.dispose();
                            fireworks.splice(fi, 1);
                        }
                    }
                }
            }

            // Spawn fireworks (0.8-2s apart, often in pairs/triples)
            function scheduleFirework() {
                const delay = 800 + Math.random() * 1200;
                setTimeout(() => {
                    launchFirework();
                    if (Math.random() > 0.5) setTimeout(launchFirework, 150 + Math.random() * 250);
                    if (Math.random() > 0.7) setTimeout(launchFirework, 400 + Math.random() * 300);
                    scheduleFirework();
                }, delay);
            }
            scheduleFirework();
            setTimeout(launchFirework, 300);

            // ── HEARTBEAT ANIMATION ──
            let beatPhase = 0;

            // ── ANIMATE ──
            function tick() {
                requestAnimationFrame(tick);
                heart.rotation.y += 0.003;

                // Gentle heartbeat
                beatPhase += 0.03;
                const beat = Math.max(0, Math.sin(beatPhase * 2)) * 0.04;
                const beatScale = heartScale * (1.0 + beat);
                heart.scale.set(beatScale, beatScale, beatScale);

                stars.rotation.y += 0.0003;

                // Rotate photo ring
                photoRing.rotation.y += 0.002;

                updateFireworks();

                controls.update();
                cssRenderer.render(cssScene, camera); // Render photos (behind)
                renderer.render(scene, camera); // Render particles (on top, transparent)
            }
            tick();

            window.addEventListener('resize', () => {
                const w = window.innerWidth, h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
                cssRenderer.setSize(w, h);
            });
        }

        /* ── FLOATING MESSAGES ── */
        function spawnLoop() {
            setInterval(() => {
                const m = document.createElement('div');
                m.className = 'msg';
                m.textContent = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
                m.style.left = (5 + Math.random() * 55) + '%'; // Stay within screen
                m.style.fontSize = (16 + Math.random() * 12) + 'px';
                m.style.setProperty('--dur', (7 + Math.random() * 4) + 's');
                document.getElementById('msgBox').appendChild(m);
                setTimeout(() => m.remove(), 12000);
            }, 2500);
        }

        // ── INIT ──
        initPetals();
        buildBook();
        // ===== MUSIC AUTOPLAY =====
window.addEventListener("load", () => {
    const music = document.getElementById("bgMusic");

    if (music) {
        music.volume = 0.4;

        const playPromise = music.play();

        if (playPromise !== undefined) {
            playPromise.catch(() => {
                document.body.addEventListener("click", () => {
                    music.play();
                }, { once: true });
            });
        }
    }
});
    </script>
